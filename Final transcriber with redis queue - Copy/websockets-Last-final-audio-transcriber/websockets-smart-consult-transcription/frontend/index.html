<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NHS Realtime Consult</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #05080f;
        --surface: #0b1120;
        --border: rgba(99, 155, 255, 0.12);
        --text: #e8edf5;
        --muted: #5b6f8a;
        --accent: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.35);
        --final-color: #e8edf5;
        --partial-color: #60a5fa;
        --partial-faded: rgba(96, 165, 250, 0.45);
        --green: #22c55e;
        --red: #ef4444;
        --radius: 1rem;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem 4rem;
        gap: 0;
      }

      /* ── Header ── */
      header {
        width: 100%;
        max-width: 780px;
        margin-bottom: 2rem;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }

      .brand-tag {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
      }

      h1 {
        font-size: 1.45rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1.2;
        color: var(--text);
      }

      h1 span { color: var(--accent); }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.35rem 0.8rem;
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--muted);
        white-space: nowrap;
        transition: color 0.3s;
      }

      .status-badge.connected { color: var(--green); border-color: rgba(34,197,94,0.25); }

      .dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--red);
        transition: background 0.3s;
      }
      .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
      .dot.pulse {
        background: var(--accent);
        animation: pulse 1.2s ease-in-out infinite;
        box-shadow: 0 0 8px var(--accent-glow);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.5; transform: scale(0.75); }
      }

      /* ── Main card ── */
      .card {
        width: 100%;
        max-width: 780px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.04);
      }

      /* ── Record control bar ── */
      .control-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.1rem 1.4rem;
        border-bottom: 1px solid var(--border);
      }

      .record-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.55rem 1.3rem;
        border-radius: 999px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: inherit;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        box-shadow: 0 4px 18px var(--accent-glow);
      }

      .record-btn:hover:not(:disabled) {
        background: #2563eb;
        box-shadow: 0 6px 24px var(--accent-glow);
        transform: translateY(-1px);
      }

      .record-btn.recording {
        background: var(--red);
        box-shadow: 0 4px 18px rgba(239,68,68,0.4);
      }

      .record-btn.recording:hover:not(:disabled) {
        background: #dc2626;
      }

      .record-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

      .mic-icon {
        width: 14px; height: 14px;
        fill: currentColor;
      }

      .status-text {
        font-size: 0.8rem;
        color: var(--muted);
        flex: 1;
      }

      .session-code {
        font-family: 'DM Mono', monospace;
        font-size: 0.65rem;
        color: var(--muted);
        opacity: 0.6;
        letter-spacing: 0.04em;
      }

      /* ── Transcript area ── */
      .transcript-area {
        min-height: 280px;
        max-height: 420px;
        padding: 1.5rem 1.6rem;
        overflow-y: auto;
        font-size: 1.05rem;
        line-height: 1.75;
        letter-spacing: -0.01em;
        font-weight: 300;
        color: var(--final-color);
        scroll-behavior: smooth;
        position: relative;
      }

      .transcript-area::-webkit-scrollbar { width: 4px; }
      .transcript-area::-webkit-scrollbar-track { background: transparent; }
      .transcript-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      /* Placeholder shown when empty */
      .placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 0.9rem;
        font-style: italic;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .placeholder.visible { opacity: 1; }

      /* Final text span — stable */
      #final-text {
        color: var(--final-color);
      }

      /* Partial text span — the "rewriting" zone */
      #partial-text {
        color: var(--partial-color);
        transition: opacity 0.1s;
        position: relative;
      }

      /* Cursor blink after partial text */
      #partial-text::after {
        content: '';
        display: inline-block;
        width: 2px;
        height: 1em;
        background: var(--partial-color);
        margin-left: 2px;
        vertical-align: text-bottom;
        border-radius: 1px;
        animation: blink 1s step-end infinite;
        opacity: 0;
        transition: opacity 0.2s;
      }

      #partial-text.active::after { opacity: 1; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Word shimmer animation when partial text changes */
      @keyframes word-in {
        from { opacity: 0.3; }
        to   { opacity: 1; }
      }

      .partial-updated {
        animation: word-in 0.18s ease-out forwards;
      }

      /* ── Footer ── */
      .card-footer {
        padding: 0.75rem 1.4rem;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .legend-item { display: flex; align-items: center; gap: 0.35rem; }
      .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
      .legend-dot.final   { background: var(--final-color); }
      .legend-dot.partial { background: var(--partial-color); }

      .word-count {
        font-family: 'DM Mono', monospace;
        font-size: 0.68rem;
        color: var(--muted);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>

    <header>
      <div class="brand">
        <span class="brand-tag">NHS · Realtime Consult</span>
        <h1>Doctor–Patient <span>Transcription</span></h1>
      </div>
      <div id="status-badge" class="status-badge">
        <div id="ws-dot" class="dot"></div>
        <span id="ws-label">Disconnected</span>
      </div>
    </header>

    <div class="card">

      <div class="control-bar">
        <button id="record-btn" class="record-btn">
          <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.5 9a.5.5 0 0 1 .5.5A7.001 7.001 0 0 1 12.5 17.93V21h2.5a.5.5 0 0 1 0 1h-6a.5.5 0 0 1 0-1H11.5v-3.07A7.001 7.001 0 0 1 5 10.5a.5.5 0 0 1 1 0 6 6 0 0 0 12 0 .5.5 0 0 1 .5-.5z"/>
          </svg>
          Start Recording
        </button>
        <span id="record-status" class="status-text">Microphone idle.</span>
        <span id="session-id" class="session-code"></span>
      </div>

      <div class="transcript-area" id="transcript-area">
        <div class="placeholder visible" id="placeholder">
          Transcript will appear here as you speak…
        </div>
        <span id="final-text"></span><span id="partial-text"></span>
      </div>

      <div class="card-footer">
        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot final"></div>
            <span>Confirmed</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot partial"></div>
            <span>Live / rewriting</span>
          </div>
        </div>
        <span class="word-count" id="word-count">0 words</span>
      </div>

    </div>

    <script>
      // ── Elements ──
      const recordBtn     = document.getElementById('record-btn');
      const recordStatus  = document.getElementById('record-status');
      const sessionIdEl   = document.getElementById('session-id');
      const wsDot         = document.getElementById('ws-dot');
      const wsLabel       = document.getElementById('ws-label');
      const statusBadge   = document.getElementById('status-badge');
      const finalEl       = document.getElementById('final-text');
      const partialEl     = document.getElementById('partial-text');
      const placeholder   = document.getElementById('placeholder');
      const transcriptArea = document.getElementById('transcript-area');
      const wordCountEl   = document.getElementById('word-count');

      // ── State ──
      let websocket    = null;
      let isRecording  = false;
      let sessionId    = crypto.randomUUID();
      let audioContext = null;
      let mediaStream  = null;
      let scriptNode   = null;
      let finalWords   = 0;   // count for word-count badge

      sessionIdEl.textContent = sessionId.slice(0, 8) + '…';

      // ── WS status ──
      function setWsStatus(state) {
        // state: 'connected' | 'disconnected' | 'recording'
        wsDot.className = 'dot';
        statusBadge.className = 'status-badge';
        if (state === 'connected' || state === 'recording') {
          wsDot.classList.add(state === 'recording' ? 'pulse' : 'on');
          statusBadge.classList.add('connected');
          wsLabel.textContent = state === 'recording' ? 'Recording' : 'Connected';
        } else {
          wsLabel.textContent = 'Disconnected';
        }
      }

      // ── Transcript rendering ──
      function appendFinal(text) {
        const trimmed = text.trim();
        if (!trimmed) return;
        // Add a space separator if there's already content
        const sep = finalEl.textContent.length > 0 ? ' ' : '';
        finalEl.textContent += sep + trimmed;
        finalWords += trimmed.split(/\s+/).filter(Boolean).length;
        updateWordCount();
        hidePlaceholder();
        scrollBottom();
      }

      function setPartial(text) {
        const trimmed = text.trim();
        if (trimmed === partialEl.textContent.trim()) return;

        // Animate on change
        partialEl.classList.remove('partial-updated');
        void partialEl.offsetWidth; // reflow
        partialEl.classList.add('partial-updated');

        const sep = finalEl.textContent.length > 0 ? ' ' : '';
        partialEl.textContent = trimmed ? sep + trimmed : '';
        partialEl.classList.toggle('active', trimmed.length > 0);

        if (trimmed) hidePlaceholder();
        scrollBottom();
      }

      function clearPartial() {
        partialEl.textContent = '';
        partialEl.classList.remove('active', 'partial-updated');
      }

      function hidePlaceholder() {
        placeholder.classList.remove('visible');
      }

      function updateWordCount() {
        wordCountEl.textContent = `${finalWords} word${finalWords !== 1 ? 's' : ''}`;
      }

      function scrollBottom() {
        transcriptArea.scrollTop = transcriptArea.scrollHeight;
      }

      function resetTranscript() {
        finalEl.textContent = '';
        clearPartial();
        placeholder.classList.add('visible');
        finalWords = 0;
        updateWordCount();
      }

      // ── Audio helpers ──
      function floatTo16BitPCM(float32Array) {
        const buf = new ArrayBuffer(float32Array.length * 2);
        const view = new DataView(buf);
        for (let i = 0; i < float32Array.length; i++) {
          let s = Math.max(-1, Math.min(1, float32Array[i]));
          view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
        }
        return buf;
      }

      function downsampleBuffer(buffer, inSR, outSR) {
        if (outSR >= inSR) return buffer;
        const ratio = inSR / outSR;
        const newLen = Math.round(buffer.length / ratio);
        const result = new Float32Array(newLen);
        let offsetResult = 0, offsetBuffer = 0;
        while (offsetResult < result.length) {
          const nextOffset = Math.round((offsetResult + 1) * ratio);
          let acc = 0, count = 0;
          for (let i = offsetBuffer; i < nextOffset && i < buffer.length; i++, count++) acc += buffer[i];
          result[offsetResult++] = count ? acc / count : 0;
          offsetBuffer = nextOffset;
        }
        return result;
      }

      // ── Recording ──
      async function startRecording() {
        if (isRecording) return;

        resetTranscript();
        sessionId = crypto.randomUUID();
        sessionIdEl.textContent = sessionId.slice(0, 8) + '…';

        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });

        const source = audioContext.createMediaStreamSource(mediaStream);
        scriptNode = audioContext.createScriptProcessor(4096, 1, 1);

        websocket = new WebSocket(`ws://${location.host}/ws/consultation/${sessionId}`);
        websocket.binaryType = 'arraybuffer';

        websocket.onopen = () => {
          setWsStatus('recording');
          recordBtn.textContent = '';
          recordBtn.insertAdjacentHTML('afterbegin', `
            <svg class="mic-icon" viewBox="0 0 24 24"><rect x="9" y="7" width="6" height="10" rx="1"/></svg>
            Stop Recording
          `);
          recordBtn.classList.add('recording');
          recordBtn.disabled = false;
          recordStatus.textContent = 'Recording… speak clearly.';
          isRecording = true;

          websocket.send(JSON.stringify({ type: 'start', sample_rate_hz: 16000 }));

          scriptNode.onaudioprocess = (e) => {
            if (!websocket || websocket.readyState !== WebSocket.OPEN) return;
            const ds = downsampleBuffer(e.inputBuffer.getChannelData(0), audioContext.sampleRate, 16000);
            websocket.send(floatTo16BitPCM(ds));
          };

          source.connect(scriptNode);
          scriptNode.connect(audioContext.destination);
        };

        websocket.onmessage = (event) => {
          if (typeof event.data !== 'string') return;
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'final') {
              appendFinal(msg.text);
              clearPartial();
            } else if (msg.type === 'partial') {
              setPartial(msg.text);
            } else if (msg.type === 'end') {
              recordStatus.textContent = 'Transcription complete.';
              clearPartial();
            } else if (msg.type === 'warning') {
              console.warn('[Transcription warning]', msg.text);
            }
          } catch {
            // Legacy plain-text fallback (shouldn't happen with updated backend)
            appendFinal(event.data);
          }
        };

        websocket.onclose = () => {
          setWsStatus('disconnected');
          resetRecordButton();
          if (isRecording) recordStatus.textContent = 'Connection closed.';
          isRecording = false;
        };

        websocket.onerror = () => {
          setWsStatus('disconnected');
          recordStatus.textContent = 'WebSocket error — check console.';
        };

        recordBtn.disabled = true;
      }

      function stopRecording() {
        if (!isRecording) return;
        isRecording = false;

        if (scriptNode) { scriptNode.disconnect(); scriptNode.onaudioprocess = null; scriptNode = null; }
        if (audioContext) { audioContext.close(); audioContext = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

        if (websocket && websocket.readyState === WebSocket.OPEN) websocket.send('END');

        resetRecordButton();
        setWsStatus('connected');
        recordStatus.textContent = 'Stopped. Finalising…';
      }

      function resetRecordButton() {
        recordBtn.innerHTML = `
          <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.5 9a.5.5 0 0 1 .5.5A7.001 7.001 0 0 1 12.5 17.93V21h2.5a.5.5 0 0 1 0 1h-6a.5.5 0 0 1 0-1H11.5v-3.07A7.001 7.001 0 0 1 5 10.5a.5.5 0 0 1 1 0 6 6 0 0 0 12 0 .5.5 0 0 1 .5-.5z"/>
          </svg>
          Start Recording`;
        recordBtn.classList.remove('recording');
        recordBtn.disabled = false;
      }

      recordBtn.addEventListener('click', () => {
        if (!isRecording) {
          startRecording().catch(err => {
            console.error(err);
            recordStatus.textContent = 'Failed to start. Check microphone permissions.';
          });
        } else {
          stopRecording();
        }
      });
    </script>
  </body>
</html>
