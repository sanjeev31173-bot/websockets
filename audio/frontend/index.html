<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Transcription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Real-time Transcription</h1>
            <div class="status-bar">
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Disconnected</span>
                </div>
                <div class="session-info">
                    <span id="sessionId">No session</span>
                </div>
            </div>
        </header>

        <main>
            <div class="controls">
                <button id="recordBtn" class="btn record-btn">
                    <span class="btn-text">Start Recording</span>
                </button>
                <button id="clearBtn" class="btn clear-btn">Clear</button>
            </div>

            <div class="transcript-container">
                <div class="transcript-header">
                    <h2>Transcript</h2>
                    <div class="vad-indicator" id="vadIndicator">
                        <span class="vad-dot"></span>
                        <span class="vad-text">Voice Activity: None</span>
                    </div>
                </div>
                <div id="transcript" class="transcript"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
