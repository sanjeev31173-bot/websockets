<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Realtime Transcription</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #05080f;
        --surface: #0b1120;
        --border: rgba(99, 155, 255, 0.12);
        --text: #e8edf5;
        --muted: #5b6f8a;
        --accent: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.35);
        --final-color: #e8edf5;
        --partial-color: #60a5fa;
        --partial-faded: rgba(96, 165, 250, 0.45);
        --green: #22c55e;
        --red: #ef4444;
        --radius: 1rem;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem 4rem;
        gap: 0;
      }

      /* ── Header ── */
      header {
        width: 100%;
        max-width: 780px;
        margin-bottom: 2rem;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }

      .brand-tag {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
      }

      h1 {
        font-size: 1.45rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1.2;
        color: var(--text);
      }

      h1 span { color: var(--accent); }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.35rem 0.8rem;
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--muted);
        white-space: nowrap;
        transition: color 0.3s;
      }

      .status-badge.connected { color: var(--green); border-color: rgba(34,197,94,0.25); }

      .dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--red);
        transition: background 0.3s;
      }
      .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
      .dot.pulse {
        background: var(--accent);
        animation: pulse 1.2s ease-in-out infinite;
        box-shadow: 0 0 8px var(--accent-glow);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.5; transform: scale(0.75); }
      }

      /* ── Main card ── */
      .card {
        width: 100%;
        max-width: 780px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.04);
      }

      /* ── Record control bar ── */
      .control-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.1rem 1.4rem;
        border-bottom: 1px solid var(--border);
      }

      .record-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.55rem 1.3rem;
        border-radius: 999px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: inherit;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        box-shadow: 0 4px 18px var(--accent-glow);
      }

      .record-btn:hover:not(:disabled) {
        background: #2563eb;
        box-shadow: 0 6px 24px var(--accent-glow);
        transform: translateY(-1px);
      }

      .record-btn.recording {
        background: var(--red);
        box-shadow: 0 4px 18px rgba(239,68,68,0.4);
      }

      .record-btn.recording:hover:not(:disabled) {
        background: #dc2626;
      }

      .record-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

      .mic-icon {
        width: 14px; height: 14px;
        fill: currentColor;
      }

      .status-text {
        font-size: 0.8rem;
        color: var(--muted);
        flex: 1;
      }

      .session-code {
        font-family: 'DM Mono', monospace;
        font-size: 0.65rem;
        color: var(--muted);
        opacity: 0.6;
        letter-spacing: 0.04em;
      }

      /* ── Transcript area ── */
      .transcript-area {
        min-height: 280px;
        max-height: 420px;
        padding: 1.5rem 1.6rem;
        overflow-y: auto;
        font-size: 1.05rem;
        line-height: 1.75;
        letter-spacing: -0.01em;
        font-weight: 300;
        color: var(--final-color);
        scroll-behavior: smooth;
        position: relative;
      }

      .transcript-area::-webkit-scrollbar { width: 4px; }
      .transcript-area::-webkit-scrollbar-track { background: transparent; }
      .transcript-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      /* Placeholder shown when empty */
      .placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 0.9rem;
        font-style: italic;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .placeholder.visible { opacity: 1; }

      /* Final text span — stable */
      #final-text {
        color: var(--final-color);
      }

      /* Partial text span — "rewriting" zone */
      #partial-text {
        color: var(--partial-color);
        transition: opacity 0.1s;
        position: relative;
      }

      /* Cursor blink after partial text */
      #partial-text::after {
        content: '';
        display: inline-block;
        width: 2px;
        height: 1em;
        background: var(--partial-color);
        margin-left: 2px;
        vertical-align: text-bottom;
        border-radius: 1px;
        animation: blink 1s step-end infinite;
        opacity: 0;
        transition: opacity 0.2s;
      }

      #partial-text.active::after { opacity: 1; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Word shimmer animation when partial text changes */
      @keyframes word-in {
        from { opacity: 0.3; }
        to   { opacity: 1; }
      }

      .partial-updated {
        animation: word-in 0.18s ease-out forwards;
      }

      /* ── Footer ── */
      .card-footer {
        padding: 0.75rem 1.4rem;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .legend-item { display: flex; align-items: center; gap: 0.35rem; }
      .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
      .legend-dot.final   { background: var(--final-color); }
      .legend-dot.partial { background: var(--partial-color); }

      .word-count {
        font-family: 'DM Mono', monospace;
        font-size: 0.68rem;
        color: var(--muted);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>

    <header>
      <div class="brand">
        <span class="brand-tag">Realtime Transcription</span>
        <h1>Real-time <span>Transcription</span></h1>
      </div>
      <div id="status-badge" class="status-badge">
        <div id="ws-dot" class="dot"></div>
        <span id="ws-label">Disconnected</span>
      </div>
    </header>

    <div class="card">

      <div class="control-bar">
        <button id="record-btn" class="record-btn">
          <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.5 9a.5.5 0 0 1 .5.5A7.001 7.001 0 0 1 12.5 17.93V21h2.5a.5.5 0 0 1 0 1h-6a.5.5 0 0 1 0-1H11.5v-3.07A7.001 7.001 0 0 1 5 10.5a.5.5 0 0 1 1 0 6 6 0 0 0 12 0 .5.5 0 0 1 .5-.5z"/>
          </svg>
          Start Recording
        </button>
        <span id="record-status" class="status-text">Microphone idle.</span>
        <span id="session-id" class="session-code"></span>
      </div>

      <div class="transcript-area" id="transcript-area">
        <div class="placeholder visible" id="placeholder">
          Transcript will appear here as you speak…
        </div>
        <span id="final-text"></span><span id="partial-text"></span>
      </div>

      <div class="card-footer">
        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot final"></div>
            <span>Confirmed</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot partial"></div>
            <span>Live / rewriting</span>
          </div>
        </div>
        <span class="word-count" id="word-count">0 words</span>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
